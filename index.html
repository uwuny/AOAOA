<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MT Replay Parser</title>
</head>
<body>
    <h1>Загрузите реплей</h1>
    <input type="file" id="fileInput">
    <button onclick="uploadReplay()">Загрузить</button>

    <h2>Результаты боя</h2>
    <table border="1" id="resultsTable">
        <tr>
            <th>Игрок</th>
            <th>Танк</th>
            <th>Урон</th>
            <th>Получено урона</th>
            <th>Фраги</th>
        </tr>
    </table>

    <script>
        async function uploadReplay() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            if (!file) return alert("Выберите файл");

            const formData = new FormData();
            formData.append("file", file);

            const response = await fetch("https://test-production-972a.up.railway.app/upload", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            const table = document.getElementById("resultsTable");

            table.innerHTML = `
                <tr>
                    <th>Игрок</th>
                    <th>Танк</th>
                    <th>Урон</th>
                    <th>Получено урона</th>
                    <th>Фраги</th>
                </tr>
            `;

            for (const [name, stats] of Object.entries(data.players)) {
                const row = table.insertRow();
                row.insertCell(0).innerText = name;
                row.insertCell(1).innerText = stats.tank;
                row.insertCell(2).innerText = stats.damage;
                row.insertCell(3).innerText = stats.damage_received;
                row.insertCell(4).innerText = stats.frags;
            }
        }
    </script>
</body>
</html>
